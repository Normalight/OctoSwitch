name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Extract section between current version header and the next version header
          NOTES=$(awk -v ver="## [v${VERSION}]" '
            BEGIN { found=0; capture=0 }
            $0 ~ ver { capture=1; next }
            capture && /^## \[v/ { exit }
            capture { print }
          ' CHANGELOG.md | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')
          if [ -z "$NOTES" ]; then
            NOTES="Full changelog: https://github.com/Normalight/OctoSwitch/blob/main/CHANGELOG.md"
          fi
          # Write to file for tauri-action
          echo "$NOTES" > release-notes.md

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OctoSwitch ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/Normalight/OctoSwitch/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
